<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvenTrack | Settings</title>
    <link rel="stylesheet" href="../CSS/index.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Hanuman:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar placeholder -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-cube"></i><span>InvenTrack</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>ផ្ទាំងគ្រប់គ្រង</span></a>
                <a href="settings.html" class="nav-item active"><i class="fas fa-sliders"></i><span>ការកំណត់</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>ការកំណត់ប្រព័ន្ធ</h1>
                <p>Configure your application preferences and security.</p>
            </header>

            <section class="card">
                <div class="card-header">
                    <h3><i class="fas fa-gears"></i> ការកំណត់ទូទៅ <span>General Settings</span></h3>
                </div>
                <div class="form-grid">
                    <div class="form-group"><label>ឈ្មោះហាង <span>Store Name</span></label><input type="text"
                            value="InvenTrack Pro"></div>
                    <div class="form-group"><label>រូបិយប័ណ្ណ <span>Currency</span></label><input type="text"
                            value="USD ($)"></div>
                    <div class="form-actions"><button class="btn-primary">រក្សាទុកការកំណត់</button></div>
                    <div class="form-actions"><a href="../index.html"><button class="btn-primary">Log Out</button></a></div>
                </div>
            </section>
        </main>
    </div>
    <script src="../JS/common.js"></script>
</body>

</html>
